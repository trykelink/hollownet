name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  collector-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            collector/requirements.txt
            collector/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r collector/requirements.txt -r collector/requirements-dev.txt

      - name: Run collector tests
        run: pytest collector/tests/ -v

  ml-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run ML tests
        run: pytest ml/tests/ -v
