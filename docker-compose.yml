services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: hollownet-cowrie
    ports:
      - "2222:2222"
    volumes:
      - cowrie_logs:/cowrie/cowrie-git/var/log/cowrie
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hollownet-db
    environment:
      POSTGRES_DB: hollownet
      POSTGRES_USER: hollownet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hollownet -d hollownet"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
      build: ./collector
      container_name: hollownet-collector
      depends_on:
        postgres:
          condition: service_healthy
      env_file: .env
      environment:
        LOG_LEVEL: ${LOG_LEVEL:-INFO}
      group_add:
        - "124"
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - cowrie_logs:/cowrie/cowrie-git/var/log/cowrie:ro
      restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    container_name: hollownet-grafana
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_DATASOURCE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped

volumes:
  postgres_data:
  cowrie_logs:
  grafana_data:
