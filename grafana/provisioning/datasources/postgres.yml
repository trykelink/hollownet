apiVersion: 1

datasources:
  - name: Hollownet PostgreSQL
    uid: hollownet-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: hollownet
    database: hollownet
    isDefault: true
    editable: true
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: ${GF_DATASOURCE_POSTGRES_PASSWORD}
